name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/web.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web run build

      - name: Unit tests
        run: pnpm --filter web run test

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: Start API server
        run: |
          pnpm --filter @workspace/api-server run dev > artifacts/api-server/api-server.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Start preview server for logs
        run: |
          pnpm --filter web run preview --port 4173 > apps/web/dev-server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        # We start it manually to capture logs. Playwright will reuse this server.

      - name: Wait for servers
        run: sleep 5

      - name: Check header overlap baselines
        run: node apps/web/scripts/check-header-overlap-baselines.mjs
        env:
          CI: "true"

      - name: E2E tests
        run: pnpm --filter web run test:e2e
        env:
          CI: "true"
          PLAYWRIGHT_USE_PREVIEW: "1"

      - name: Upload logs and missing stems on failure
        if: failure()
        uses: actions/upload-artifact@b689ef1324f4b119de46c83b2a09aeff8ab85a47 # v4.6.0
        with:
          name: failure-diagnostics
          path: |
            apps/web/dev-server.log
            artifacts/api-server/api-server.log
            apps/web/missing-baselines.txt
            apps/web/test-results/
          if-no-files-found: warn
