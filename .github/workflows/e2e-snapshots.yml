name: Update E2E snapshots

on:
  workflow_dispatch:

jobs:
  header-overlap-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web run build

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: Update header overlap snapshots
        run: pnpm --filter web exec playwright test e2e/headerOverlap.spec.ts --update-snapshots
        env:
          CI: "true"

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@b689ef1324f4b119de46c83b2a09aeff8ab85a47 # v4.6.0
        with:
          name: headerOverlap-snapshots
          path: apps/web/e2e/headerOverlap.spec.ts-snapshots/
          if-no-files-found: error
