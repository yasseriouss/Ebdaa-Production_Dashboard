    <meta charset="UTF-8" />
    <script>
      try {
        var k = "factory-data-hub:ui-theme";
        var t = localStorage.getItem(k);
        if (t === "industrial" || t === "executive") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
      try {
        var d = localStorage.getItem("factory-data-hub:direction");
        if (d === "ltr" || d === "rtl") {
          document.documentElement.setAttribute("dir", d);
          document.documentElement.setAttribute("lang", d === "rtl" ? "ar" : "en");
        }
      } catch (e) {}
    </script>
