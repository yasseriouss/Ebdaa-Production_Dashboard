kind = "web"
previewPath = "/"
title = "نظام إدارة مصنعي إبداع للأثاث"
version = "1.0.0"
id = "artifacts/factory-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/factory-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/factory-app", "run", "build" ]
publicDir = "artifacts/factory-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
