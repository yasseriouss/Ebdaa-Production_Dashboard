openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: |
    Ebdaa Furniture Factory Management System API

    **Integration (web vs legacy routes):**
    - `factory-hub` paths (`/factory-hub/*`) back the Grand Line React dashboard — JSON-first `fh_*` tables in LibSQL.
    - `/wooden/*` and `/metal/*` remain the stable HTTP contract for ERP-style integrations; they use `wooden_*` / `metal_*` tables.
    - Optional env `FH_SYNC_WOODEN=true` enables a bridge that mirrors hub wood updates into `wooden_work_orders` via a documented field mapping (see `docs/legacy-adapter-factory-hub.md`).
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: metal-orders
    description: Metal factory work orders
  - name: metal-stages
    description: Metal factory production stages
  - name: wooden-orders
    description: Wooden factory work orders
  - name: wooden-stages
    description: Wooden factory production stages
  - name: shared-projects
    description: Cross-factory shared projects
  - name: dashboard
    description: Dashboard statistics and KPIs
  - name: import-export
    description: Import and export operations
  - name: employees
    description: Workforce roster and headcount
  - name: capacity
    description: Factory capacity — machines (tasks) and departments
  - name: factory-hub
    description: |
      Grand Line web panel JSON store (LibSQL `fh_*` tables). Canonical for the React dashboard.
      Legacy `/wooden` and `/metal` remain stable for other clients; see description under Integration notes.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /capacity/machines:
    get:
      operationId: listCapacityMachines
      tags: [capacity]
      summary: List all production machines (tasks) with their departments
      responses:
        "200":
          description: Machines tied to departments (from capacity schema)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapacityMachineRow"

  # ---- Metal Work Orders ----
  /metal/orders:
    get:
      operationId: listMetalOrders
      tags: [metal-orders]
      summary: List all metal work orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: client
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of metal work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetalWorkOrder"
    post:
      operationId: createMetalOrder
      tags: [metal-orders]
      summary: Create a new metal work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMetalOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalWorkOrder"

  /metal/orders/{id}:
    get:
      operationId: getMetalOrder
      tags: [metal-orders]
      summary: Get a single metal work order with stages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Metal work order with production stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalWorkOrderDetail"
        "404":
          description: Not found
    put:
      operationId: updateMetalOrder
      tags: [metal-orders]
      summary: Update a metal work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMetalOrderBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalWorkOrder"
    delete:
      operationId: deleteMetalOrder
      tags: [metal-orders]
      summary: Delete a metal work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- Metal Production Stages ----
  /metal/stages:
    get:
      operationId: listMetalStages
      tags: [metal-stages]
      summary: List metal production stage records
      parameters:
        - name: moNumber
          in: query
          schema:
            type: string
        - name: stageName
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of metal stage records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetalProductionStage"
    post:
      operationId: createMetalStage
      tags: [metal-stages]
      summary: Create a new metal production stage record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMetalStageBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalProductionStage"

  /metal/stages/{id}:
    get:
      operationId: getMetalStage
      tags: [metal-stages]
      summary: Get a single metal production stage record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Metal production stage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalProductionStage"
        "404":
          description: Not found
    put:
      operationId: updateMetalStage
      tags: [metal-stages]
      summary: Update a metal production stage record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMetalStageBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetalProductionStage"
    delete:
      operationId: deleteMetalStage
      tags: [metal-stages]
      summary: Delete a metal production stage record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /metal/stages/summary:
    get:
      operationId: getMetalStagesSummary
      tags: [metal-stages]
      summary: Get stage bottleneck summary (WIP per stage)
      responses:
        "200":
          description: Stage summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageSummary"

  # ---- Wooden Work Orders ----
  /wooden/orders:
    get:
      operationId: listWoodenOrders
      tags: [wooden-orders]
      summary: List all wooden work orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: client
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of wooden work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WoodenWorkOrder"
    post:
      operationId: createWoodenOrder
      tags: [wooden-orders]
      summary: Create a new wooden work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWoodenOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WoodenWorkOrder"

  /wooden/orders/{id}:
    get:
      operationId: getWoodenOrder
      tags: [wooden-orders]
      summary: Get a single wooden work order with stages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wooden work order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WoodenWorkOrderDetail"
        "404":
          description: Not found
    put:
      operationId: updateWoodenOrder
      tags: [wooden-orders]
      summary: Update a wooden work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWoodenOrderBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WoodenWorkOrder"
    delete:
      operationId: deleteWoodenOrder
      tags: [wooden-orders]
      summary: Delete a wooden work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- Wooden Production Stages ----
  /wooden/stages:
    get:
      operationId: listWoodenStages
      tags: [wooden-stages]
      summary: List wooden production stage records
      parameters:
        - name: orderId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of wooden stage records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WoodenProductionStage"
    post:
      operationId: createWoodenStage
      tags: [wooden-stages]
      summary: Create a new wooden production stage record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWoodenStageBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WoodenProductionStage"

  /wooden/stages/summary:
    get:
      operationId: getWoodenStagesSummary
      tags: [wooden-stages]
      summary: Get wooden stage bottleneck summary (WIP per stage)
      responses:
        "200":
          description: Wooden stage WIP summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageSummary"

  /wooden/stages/{id}:
    get:
      operationId: getWoodenStage
      tags: [wooden-stages]
      summary: Get a single wooden production stage record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wooden production stage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WoodenProductionStage"
        "404":
          description: Not found
    put:
      operationId: updateWoodenStage
      tags: [wooden-stages]
      summary: Update a wooden production stage record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWoodenStageBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WoodenProductionStage"
    delete:
      operationId: deleteWoodenStage
      tags: [wooden-stages]
      summary: Delete a wooden production stage record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- Shared Projects ----
  /shared-projects:
    get:
      operationId: listSharedProjects
      tags: [shared-projects]
      summary: List projects that appear in both factories
      responses:
        "200":
          description: List of shared projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedProject"

  # ---- Dashboard ----
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/gantt:
    get:
      operationId: getDashboardGantt
      tags: [dashboard]
      summary: Get Gantt chart data for all work orders
      parameters:
        - name: factory
          in: query
          schema:
            type: string
            enum: [metal, wooden, all]
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Gantt chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GanttItem"

  /dashboard/clients:
    get:
      operationId: getDashboardClients
      tags: [dashboard]
      summary: Get top clients by order volume
      responses:
        "200":
          description: Client statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientStat"

  /dashboard/completion-trend:
    get:
      operationId: getCompletionTrend
      tags: [dashboard]
      summary: Get completion rate trend over time
      responses:
        "200":
          description: Completion trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompletionTrendPoint"

  # ---- Import / Export ----
  /import/metal-orders:
    post:
      operationId: importMetalOrders
      tags: [import-export]
      summary: Import metal orders from Excel file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /import/metal-daily:
    post:
      operationId: importMetalDailyProduction
      tags: [import-export]
      summary: Import metal daily production from Excel file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /import/wooden-orders:
    post:
      operationId: importWoodenOrders
      tags: [import-export]
      summary: Import wooden orders from Excel file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /import/sheets-template:
    post:
      operationId: importSheetsTemplate
      tags: [import-export]
      summary: Import the full Ebdaa Google Sheets template (metal + wooden) in one shot with auto column mapping and duplicate detection
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Combined import result for both factories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetsTemplateImportResult"

  /export/metal-orders:
    get:
      operationId: exportMetalOrders
      tags: [import-export]
      summary: Export metal orders as Excel or PDF
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [xlsx, pdf]
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /export/wooden-orders:
    get:
      operationId: exportWoodenOrders
      tags: [import-export]
      summary: Export wooden orders as Excel or PDF
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [xlsx, pdf]
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ---- Employees / Workforce ----
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees with optional filters
      parameters:
        - name: department_id
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: factory_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: redact
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"

  /employees/stats:
    get:
      operationId: getEmployeeStats
      tags: [employees]
      summary: Roster totals and by-department breakdown
      responses:
        "200":
          description: Employee statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeStats"

  /employees/headcount:
    get:
      operationId: getEmployeesHeadcount
      tags: [employees]
      summary: Plan vs actual headcount by department
      responses:
        "200":
          description: Headcount comparison
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeadcountRow"

  /export/employees:
    get:
      operationId: exportEmployees
      tags: [employees]
      summary: Export employees as CSV
      parameters:
        - name: department_id
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: factory_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: redact
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  # ---- Factory Hub (Grand Line web JSON) ----
  /factory-hub/wood-work-orders:
    get:
      operationId: listFhWoodWorkOrders
      tags: [factory-hub]
      summary: List wood work orders (panel JSON)
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FhWoodWorkOrderEnvelope"
    post:
      operationId: createFhWoodWorkOrder
      tags: [factory-hub]
      summary: Create or replace a wood work order row
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FhWoodWorkOrderPayload"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhWoodWorkOrderEnvelope"

  /factory-hub/wood-work-orders/{workOrderId}:
    parameters:
      - name: workOrderId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFhWoodWorkOrder
      tags: [factory-hub]
      summary: Get one wood work order
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhWoodWorkOrderEnvelope"
        "404":
          description: Not found
    put:
      operationId: updateFhWoodWorkOrder
      tags: [factory-hub]
      summary: Replace wood work order JSON
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FhWoodWorkOrderPayload"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhWoodWorkOrderEnvelope"
        "404":
          description: Not found
    delete:
      operationId: deleteFhWoodWorkOrder
      tags: [factory-hub]
      summary: Delete wood work order
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /factory-hub/reference/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFhReferenceSnapshot
      tags: [factory-hub]
      summary: Get reference snapshot by key
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhReferenceEnvelope"
        "404":
          description: Not found
    put:
      operationId: putFhReferenceSnapshot
      tags: [factory-hub]
      summary: Upsert reference snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FhReferencePutBody"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhReferenceEnvelope"

  /factory-hub/work-order-analysis-sessions:
    get:
      operationId: listFhAnalysisSessions
      tags: [factory-hub]
      summary: List analysis sessions
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FhAnalysisSessionEnvelope"
    post:
      operationId: createFhAnalysisSession
      tags: [factory-hub]
      summary: Create analysis session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FhAnalysisSessionPayload"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhAnalysisSessionEnvelope"

  /factory-hub/work-order-analysis-sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFhAnalysisSession
      tags: [factory-hub]
      summary: Get analysis session
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhAnalysisSessionEnvelope"
        "404":
          description: Not found
    put:
      operationId: updateFhAnalysisSession
      tags: [factory-hub]
      summary: Update analysis session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FhAnalysisSessionPayload"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhAnalysisSessionEnvelope"
        "404":
          description: Not found
    delete:
      operationId: deleteFhAnalysisSession
      tags: [factory-hub]
      summary: Delete analysis session
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /factory-hub/new-project-autosave:
    get:
      operationId: getFhNewProjectAutosave
      tags: [factory-hub]
      summary: Load new-project wizard autosave
      responses:
        "200":
          description: Autosave document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhNewProjectAutosaveEnvelope"
        "404":
          description: No autosave yet
    put:
      operationId: putFhNewProjectAutosave
      tags: [factory-hub]
      summary: Save new-project wizard autosave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FhNewProjectAutosavePayload"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhNewProjectAutosaveEnvelope"

  /factory-hub/seed:
    post:
      operationId: seedFactoryHub
      tags: [factory-hub]
      summary: Seed fh_* tables from fixtures (dev or FH_ALLOW_SEED=true)
      responses:
        "200":
          description: Seed summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FhSeedResult"
        "403":
          description: Seeding disabled

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
